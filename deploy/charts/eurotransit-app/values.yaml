# Elenco dei microservizi gestiti da questo chart.
services:
  frontend:
    enabled: true # Abilita o disabilita la creazione delle risorse Kubernetes per questo servizio.
    replicaCount: 1 # Numero di pod da avviare per il frontend.
    image:
      repository: docker.io/lorenzogaetani/eurotransit-frontend # Immagine Docker del frontend.
      tag: 1.10.4 # Versione dell'immagine Docker da deployare.
      pullPolicy: IfNotPresent # Scarica l'immagine solo se non e' gia' presente sul nodo.
    service:
      type: ClusterIP # Espone il servizio solo dentro il cluster Kubernetes.
      port: 80 # Porta interna del Service Kubernetes per il frontend.
  catalog:
    enabled: true # Abilita o disabilita la creazione delle risorse Kubernetes per questo servizio.
    replicaCount: 1 # Numero di pod da avviare per il catalogo.
    image:
      repository: docker.io/lorenzogaetani/eurotransit-catalog # Immagine Docker del servizio catalogo.
      tag: 1.10.4 # Versione dell'immagine Docker da deployare.
      pullPolicy: IfNotPresent # Scarica l'immagine solo se non e' gia' presente sul nodo.
    service:
      type: ClusterIP # Espone il servizio solo dentro il cluster Kubernetes.
      port: 8080 # Porta interna del Service Kubernetes per il catalogo.
    database:
      enabled: true # Se true crea Secret, Cluster CloudNativePG e variabili datasource per questo servizio.
      clusterName: eurotransit-app-catalog-db # Nome del Cluster CloudNativePG; il service read/write sara' <clusterName>-rw.
      databaseName: catalog # Nome del database applicativo creato al bootstrap.
      username: catalog # Utente proprietario del database applicativo.
      secretName: eurotransit-app-catalog-db-credentials # Secret basic-auth usato sia da CloudNativePG sia dal pod catalog.
      passwordKey: password # Chiave del Secret letta da Spring come password.
      instances: 1 # Numero di istanze Postgres; in produzione valuta 3 per alta disponibilita'.
      imageName: ghcr.io/cloudnative-pg/postgresql:18 # Immagine Postgres usata dal Cluster CloudNativePG.
      annotations:
        helm.sh/resource-policy: keep # Evita la cancellazione automatica del Cluster DB se il chart viene disinstallato.
      storage:
        size: 1Gi # Dimensione del volume persistente del database.
      backups:
        enabled: false # Placeholder per backup futuri; i backup richiedono configurazione object storage.
  inventory:
    enabled: true # Abilita o disabilita la creazione delle risorse Kubernetes per questo servizio.
    replicaCount: 1 # Numero di pod da avviare per l'inventario.
    image:
      repository: docker.io/lorenzogaetani/eurotransit-inventory # Immagine Docker del servizio inventario.
      tag: 1.10.4 # Versione dell'immagine Docker da deployare.
      pullPolicy: IfNotPresent # Scarica l'immagine solo se non e' gia' presente sul nodo.
    service:
      type: ClusterIP # Espone il servizio solo dentro il cluster Kubernetes.
      port: 8081 # Porta interna del Service Kubernetes per l'inventario.
    database:
      enabled: true # Se true crea Secret, Cluster CloudNativePG e variabili datasource per questo servizio.
      clusterName: eurotransit-app-inventory-db # Nome del Cluster CloudNativePG; il service read/write sara' <clusterName>-rw.
      databaseName: inventory # Nome del database applicativo creato al bootstrap.
      username: inventory # Utente proprietario del database applicativo.
      secretName: eurotransit-app-inventory-db-credentials # Secret basic-auth usato sia da CloudNativePG sia dal pod inventory.
      passwordKey: password # Chiave del Secret letta da Spring come password.
      instances: 1 # Numero di istanze Postgres; in produzione valuta 3 per alta disponibilita'.
      imageName: ghcr.io/cloudnative-pg/postgresql:18 # Immagine Postgres usata dal Cluster CloudNativePG.
      annotations:
        helm.sh/resource-policy: keep # Evita la cancellazione automatica del Cluster DB se il chart viene disinstallato.
      storage:
        size: 1Gi # Dimensione del volume persistente del database.
      backups:
        enabled: false # Placeholder per backup futuri; i backup richiedono configurazione object storage.
nameOverride: "" # Permette di sovrascrivere il nome base del chart.
fullnameOverride: "" # Permette di sovrascrivere il nome completo delle risorse generate.
serviceAccount:
  create: false # Se true crea un ServiceAccount dedicato; con false usa quello default del namespace.
  automount: true # Se true monta automaticamente il token del ServiceAccount nei pod.
  annotations: {} # Annotazioni opzionali da aggiungere al ServiceAccount.
  name: "" # Nome di un ServiceAccount esistente o nome custom se create e' true.
autoscaling:
  enabled: false # Disabilita l'HorizontalPodAutoscaler generato dal template scaffold.
ingress:
  enabled: true # Abilita la creazione dell'Ingress per esporre l'app tramite Traefik.
  className: traefik # Nome dell'IngressClass gestita da Traefik.
  annotations: {} # Annotazioni opzionali Traefik, ad esempio middleware, entrypoint o redirect.
  host: eurotransit.local # Host usato dal browser per raggiungere l'app.
  tls:
    enabled: false # Metti true se vuoi esporre l'app in HTTPS.
    secretName: "" # Nome del Secret TLS da usare quando tls.enabled e' true.
  routes:
    - path: /api/catalog # Espone le API del catalogo sotto /api.
      pathType: Prefix # Prefix instrada anche path come /api/products.
      service: catalog # Nome del servizio applicativo definito sotto services.
      port: 8080 # Porta del Service Kubernetes del catalogo.
    - path: /api/inventory # Espone le API dell'inventario sotto /api.
      pathType: Prefix # Prefix instrada anche path come /api/inventory/items.
      service: inventory # Nome del servizio applicativo definito sotto services.
      port: 8081 # Porta del Service Kubernetes dell'inventario.
    - path: / # Espone il frontend sulla root dell'host.
      pathType: Prefix # Prefix instrada tutte le richieste che iniziano con questo path.
      service: frontend # Nome del servizio applicativo definito sotto services.
      port: 80 # Porta del Service Kubernetes da raggiungere.
httpRoute:
  enabled: false # Disabilita HTTPRoute/Gateway API finche' non viene configurato un Gateway.
