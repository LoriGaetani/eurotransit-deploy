{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "eurotransit-app.fullname" $root }}-{{ $name }}-test-connection"
  labels:
    {{- include "eurotransit-app.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "eurotransit-app.fullname" $root }}-{{ $name }}:{{ $svc.service.port }}']
  restartPolicy: Never
{{- end }}
{{- end }}
