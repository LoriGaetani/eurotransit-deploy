{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled $svc.database $svc.database.enabled $svc.database.secretName $svc.database.password }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $svc.database.secretName }}
  labels:
    {{- include "eurotransit-app.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ $svc.database.username | quote }}
  {{ $svc.database.passwordKey | default "password" }}: {{ $svc.database.password | quote }}
{{- end }}
{{- end }}
