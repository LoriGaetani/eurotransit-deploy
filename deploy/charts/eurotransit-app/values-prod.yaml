# Override per l'ambiente di produzione.
fullnameOverride: eurotransit-app-prod
sealedSecrets:
  enabled: true
  catalog:
    encryptedData:
      username: ""
      password: ""
  inventory:
    encryptedData:
      username: ""
      password: ""
  order:
    encryptedData:
      username: ""
      password: ""

services:
  frontend:
    replicaCount: 1
    image:
      tag: 1.14.4
      pullPolicy: IfNotPresent
  inventory:
    replicaCount: 1
    image:
      tag: 1.14.5
      pullPolicy: IfNotPresent
    extraEnv:
      - name: CATALOG_BASE_URL
        value: http://eurotransit-app-prod-catalog:8080
      - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
        value: eurotransit-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
  catalog:
    replicaCount: 1
    image:
      tag: 1.14.3
      pullPolicy: IfNotPresent
  order:
    replicaCount: 1
    image:
      tag: 1.14.5
      pullPolicy: IfNotPresent
    extraEnv:
      - name: INVENTORY_BASE_URL
        value: http://eurotransit-app-prod-inventory:8081
      - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
        value: eurotransit-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092

ingress:
  host: eurotransit.local
