# kafka-cluster-minikube.yaml
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: eurotransit-kafka
  namespace: kafka
spec:
  kafka:
    version: 4.2.0
    metadataVersion: "4.2"
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      auto.create.topics.enable: false
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: pool-a
  namespace: kafka
  labels:
    strimzi.io/cluster: eurotransit-kafka
spec:
  replicas: 1
  roles:
    - controller # gestisce l'amministrazione del cluster
    - broker     # per salvare i messaggi
  storage:
    type: persistent-claim
    size: 5Gi
    deleteClaim: true